<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nyelva Map</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    /* This ensures the footer sits on top of the map at the bottom */
    #site-footer {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.8); /* See-through white */
      z-index: 1000; /* Keeps it above the map */
      text-align: center;
      padding: 10px 0;
      font-family: sans-serif;
      font-size: 14px;
    }
    #site-footer a {
      color: #333;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }
    #site-footer a:hover {
      text-decoration: underline;
    }
    /* Ensure map takes up full screen but leaves room for logic */
    body, html { margin: 0; padding: 0; height: 100%; }
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>

  <div id="map"></div>

  <!-- THE NEW FOOTER SECTION -->
  <footer id="site-footer">
    <a href="about.html">About Us</a> | 
    <a href="contact.html">Contact Us</a> | 
    <a href="privacy-policy.html">Privacy Policy</a>
  </footer>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
